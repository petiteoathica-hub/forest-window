  <div class="gallery-frame">

  </div>

  <button onclick="location.href='index.html'">
  客間へ戻る
  </button>


  <script>
    setInterval(() => {
        galleryImage.classList.add("whiteout");
        setTimeout(() => {
            current++;
            if(current > 24){
                current = 1;
            }
            const number = String(current).padStart(2,"0");
            galleryImage.src =
            `cards/card${number}_0.png`;
            galleryImage.classList.remove("whiteout");
          
        },1500);
    },5000);
  </script>
