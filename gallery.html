<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>小屋の幻灯</title>
</head>

<body>

<div class="gallery-frame">
  <img id="galleryImage" src="cards/card01_0.png">
</div>

<button onclick="location.href='index.html'">
  客間へ戻る
</button>


<script>
 let current = 1;

setInterval(() => {
  current++;

  if (current > 24) {
    current = 1;
  }

  const number = String(current).padStart(2, "0");
  document.getElementById("galleryImage").src = `cards/card${number}_0.png`;
}, 5000); 
</script> 

</body>
  
</html>
