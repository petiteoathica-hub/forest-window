<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>小屋の幻灯</title>
</head>


    
<style>
    .gallery-frame{
        position:relative;
    }

    #galleryImage {
      display: block;
      width: 100%;
    }
    
    #flash{
        position:absolute;
        inset:0;
        background:white;
        opacity:0;
        pointer-events:none;
        transition:opacity 1.2s ease;
    }

    #flash.active{
        opacity:1;
    }
</style>
  
<body>
　<div class="gallery-frame">
    <img id="galleryImage">
    <div id="flash"></div>
　</div>
    
  <button onclick="location.href='index.html'">
  客間へ戻る
  </button>

<script>
  let current = 1;
  const galleryImage = document.getElementById("galleryImage");
  const flash = document.getElementById("flash");
  
  setInterval(() => {
    flash.classList.add("active");
    
      setTimeout(() => {
      current++;

      if (current > 24) {
        current = 1;
      }

      const number = String(current).padStart(2, "0");
      galleryImage.src = `cards/card${number}_0.png`;

      galleryImage.classList.remove("active");
    }, 1200);

  }, 5000);
</script>
  

</body>
  
</html>
