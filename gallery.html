<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>小屋の幻灯</title>
</head>
    
<style>
    body{
        margin:0;
        display:flex;
        flex-direction:column;
        height:100vh;
        padding:12px;
        box-sizing:border-box;
    }

    .gallery-frame{
        flex:1;
        position:relative;

        background-image: url("cards/card01_0.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;

        border-radius: 48px;
        overflow: hidden;
    }

    button{
        margin-top:24px;
    }
    
    #galleryImage {
      display: block;
      width: 100%;
    }
    
    #flash{
        position:absolute;
        inset:0;
        background:white;
        opacity:0;
        pointer-events:none;
        transition:opacity 1.2s ease;
    }

    #flash.active{
        opacity:1;
    }
</style>
  
<body>
<div class="gallery-frame" id="galleryFrame">
  <div id="flash"></div>
</div>
    
  <button onclick="location.href='index.html'">
  客間へ戻る
  </button>

<script>
  let current = 1;

  const total = 24;
  const galleryImage = document.getElementById("galleryFrame");
  const flash = document.getElementById("flash");

  function getImagePath(number) {
    const padded = String(number).padStart(2, "0");
    return `cards/card${padded}_0.png`;
  }

  function nextImage() {
    let next = current + 1;

    if (next > total) {
      next = 1;
    }

    const nextPath = getImagePath(next);

    // 次の画像を先に読み込む
    const preload = new Image();
    preload.src = nextPath;

    preload.onload = () => {
      // 読み込み完了してから白くする
      flash.classList.add("active");

      setTimeout(() => {
        galleryFrame.style.backgroundImage = `url("${nextPath}")`;
        current = next;

        flash.classList.remove("active");
      }, 1200);
    };
  }

  setInterval(nextImage, 5000);
</script>
  

</body>
  
</html>
