<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客間の窓</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  background: url("window.png") center top / cover fixed no-repeat;
  color: #3c2f24;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 12px;
  box-sizing: border-box;
}

  #result {
  min-height: 58vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.button-area {
  min-height: 18vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
  
  .app {
    width: 100%;
    max-width: 720px;
    text-align: center;
  }

.room {
  position: relative;
  border-radius: 26px;
  background: rgba(246, 237, 220, 0.82);
  box-shadow: 0 20px 50px rgba(80, 55, 30, 0.25);
  overflow: hidden;
  backdrop-filter: blur(4px);
  margin-top: 72px;
  padding: 22px 18px 24px;
}

.window {
  width: 100%;
  max-width: 100%;
  margin: 0 auto 24px;
  border-radius: 22px;
  overflow: hidden;
  box-shadow: 0 18px 40px rgba(80, 55, 30, 0.25);
}

.window img {
  width: 100%;
  height: auto;
  display: block;
}

　.shine {
  　position: absolute;
  　inset: 0;
  　background: radial-gradient(circle, rgba(255,244,204,0.95), rgba(255,244,204,0.25) 35%, transparent 70%);
  　opacity: 0;
  　transform: scale(0.5);
  　pointer-events: none;
　}

  .whiteout {
    position: fixed;
    inset: 0;
    background: #fff8df;
    opacity: 0;
    pointer-events: none;
    z-index: 10;
  }

h1 {
  font-size: 34px;
  margin: 18px 0 18px;
}

  .subtitle {
    line-height: 1.9;
    font-size: 15px;
    margin-bottom: 20px;
  }

.card-image {
  width: 60%;
  /*max-width: 220px;*/
  aspect-ratio: 3 / 4;
  object-fit: cover;
  border-radius: 16px;
  display: block;
  margin: 18px auto 18px;
  box-shadow: 0 16px 35px rgba(40, 25, 10, 0.35);
}
    
  .message {
    font-size: 17px;
    line-height: 1.65;
    white-space: pre-line;
  }

  .card-name {
    font-size: 36px;
    margin: 18px 0 8px;
  }

  .keyword {
    font-size: 14px;
    opacity: 0.75;
    margin-bottom: 18px;
  }

  button {
    border: none;
    border-radius: 999px;
    padding: 14px 34px;
    font-size: 16px;
    background: #d8bd7f;
    color: #3a2a17;
    cursor: pointer;
    box-shadow: 0 6px 14px rgba(90, 55, 20, 0.25);
  }

  button:disabled {
    opacity: 0.6;
  }
 .button-area {
   text-align: center;
   margin-top: 18px;
 }

 .button-area button {
   width: 220px;
}
  
  .footer {
    margin-top: 18px;
    font-size: 12px;
    opacity: 0.65;
  }

  .opening .window {
    animation: windowGlow 1.6s ease-in-out;
  }

  .opening .shine {
    animation: shineOpen 1.6s ease-in-out;
  }

  .opening .whiteout {
    animation: whiteFlash 1.8s ease-in-out;
  }

  @keyframes windowGlow {
    0% { transform: scale(1); }
    45% { transform: scale(1.02); box-shadow: 0 0 55px rgba(255,210,120,0.9); }
    100% { transform: scale(1); }
  }

  @keyframes shineOpen {
    0% { opacity: 0; transform: scale(0.4); }
    50% { opacity: 1; transform: scale(1.25); }
    100% { opacity: 0; transform: scale(2.2); }
  }

  @keyframes whiteFlash {
    0% { opacity: 0; }
    55% { opacity: 0; }
    75% { opacity: 0.95; }
    100% { opacity: 0; }
  }

  @media (max-width: 500px) {
  .room {
    width: 60%;
    /*max-width: 360px;*/
    margin: 40px auto 0;
  }

  h1 {
    font-size: 38px;
    margin: 14px 0 18px;
  }

  .subtitle {
    font-size: 18px;
    line-height: 1.7;
    margin-bottom: 18px;
  }

  .card-image {
    width: 55%;
    /*max-width: 300px;*/
    margin: 5px auto 5px;
  }

  .card-name {
    font-size: 28px;
    margin: 12px 0 8px;
  }

  .keyword {
    margin-bottom: 12px;
  }

  .message {
    font-size: 16px;
    line-height: 1.5;
  }

  button {
    margin-top: 10px;
    padding: 12px 30px;
  }
}
</style>
</head>

<body>
  <main class="app" id="app">
    <section class="room">
　　
      <div id="result">
        <h1>客間の窓</h1>
        <p class="subtitle">
          森の小屋の客間には、<br>
          今必要な景色を映す<br>
          窓があります。
        </p>
        <p class="message">窓の向こうは、まだ静かです。</p>
      </div>
    </section> 

    <div class="button-area">
      <button id="drawButton" onclick="startOracle()">窓を見る</button>
    </div>

    <p class="footer">Petite Oathica<br>客間の窓</p>
    <div class="whiteout"></div>
  </main>

<script>
const cards = [
  { name: "小屋の灯", keyword: "希望・灯火", message: "大きく変えなくてもいい。\n今日灯せる範囲を灯そう。", image: "cards/card01.png" },
  { name: "暖炉の火", keyword: "情熱・火種", message: "小さな火種を守る。\n勢いより継続。", image: "cards/card01.png" },
  { name: "窓辺の作業机", keyword: "制作・実践", message: "考えるより少しだけ手を動かす。", image: "cards/card01.png" },
  { name: "月の湯", keyword: "調律・休息", message: "答えを探す前に整える。", image: "cards/card04.png" },
  { name: "地下室の宝箱", keyword: "保留・熟成", message: "今は開かないものもある。", image: "cards/card01.png" },
  { name: "ソラの書斎", keyword: "記録・整理", message: "言葉にすると見えてくる。", image: "cards/card06.png" },
  { name: "老師の紙片", keyword: "知恵・余裕", message: "深刻さを少し笑いに変えてみる。", image: "cards/card01.png" },
  { name: "真珠色の金魚", keyword: "魂・内なる声", message: "静かな場所に答えは泳いでいる。", image: "cards/card08.png" },
  { name: "森の白猫", keyword: "気まぐれ・癒し", message: "予定外の優しさを受け取る。", image: "cards/card01.png" },
  { name: "桃の若木", keyword: "成長・未来", message: "見えなくても育っている。", image: "cards/card10.png" },
  { name: "トルマリンの泉", keyword: "浄化・循環", message: "濁りは流してしまおう。", image: "cards/card01.png" },
  { name: "白日花", keyword: "開放・存在", message: "理由はいらない。\nただ咲けばいい。", image: "cards/card01.png" },
  { name: "灯花", keyword: "勇気・夜の光", message: "闇の中にも灯りはある。", image: "cards/card01.png" },
  { name: "雪解", keyword: "再開・流れ", message: "止まっていたものが動き出す。", image: "cards/card01.png" },
  { name: "名もなき空色", keyword: "自由・余白", message: "名前のない喜びを大切に。", image: "cards/card01.png" },
  { name: "光のきざはし", keyword: "導き・兆し", message: "まだ全部見えなくても進める。", image: "cards/card01.png" },
  { name: "星降りの湖", keyword: "広い視点・神秘", message: "少し高い場所から眺めてみる。", image: "cards/card01.png" },
  { name: "眠り龍の谷", keyword: "力・静観", message: "今は起こさなくていい力もある。", image: "cards/card01.png" },
  { name: "森のフクロウ", keyword: "観察・洞察", message: "急がず、まず見る。", image: "cards/card01.png" },
  { name: "月夜の誓い", keyword: "自己信頼・約束", message: "自分との約束を思い出す。", image: "cards/card01.png" },
  { name: "魔法の地図", keyword: "選択・現在地", message: "目的地より現在地を知る。", image: "cards/card01.png" },
  { name: "行商人の荷車", keyword: "交換・出会い", message: "持っているものと、\n受け取るものは同じではない。", image: "cards/card01.png" },
  { name: "風の抜け道", keyword: "移動・変化", message: "場所を変えると風向きも変わる。", image: "cards/card01.png" },
  { name: "ひと枝", keyword: "選択・十分", message: "全部は要らない。\n一本で十分。", image: "cards/card01.png" }
];

function startOracle() {
  const app = document.getElementById("app");
  const button = document.getElementById("drawButton");

  button.disabled = true;
  app.classList.add("opening");

  setTimeout(() => {
    drawCard();
  }, 1350);

  setTimeout(() => {
    app.classList.remove("opening");
    button.disabled = false;
  }, 1900);
}

function drawCard() {
  const randomIndex = Math.floor(Math.random() * cards.length);
  const card = cards[randomIndex];

  document.getElementById("result").innerHTML = `
   <img class="card-image" src="${card.image}" alt="${card.name}">
   <h2 class="card-name">${card.name}</h2>
   <p class="keyword">${card.keyword}</p>
   <p class="message">${card.message}</p>
  `;
}
</script>
</body>
</html>
