<!DOCTYPE html>
<html lang="ja">
<head> <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>客間の窓</title> <link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="小屋の幻灯">

<style>  
body {
  margin: 0;
  background: #e8e2d8;
  display: flex;
  justify-content: center;
  padding: 10px;
  box-sizing: border-box;

  font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  color: #3c2f24;
}

#result {
  min-height: 30vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.app {
  width: 100%;
  aspect-ratio: 9 / 17;

  background: url("window.png") center top / cover no-repeat;

  box-shadow: 0 10px 40px rgba(0,0,0,.25);
  border-radius: 24px;
  overflow: hidden;
  position: relative;
  text-align: center;
}

.room {
  width: min(90%, 560px);
  margin: 140px auto;
  position: relative;
  border-radius: 26px;
  background: rgba(255, 248, 230, 0.2);
  box-shadow: 0 20px 50px rgba(80, 55, 30, 0.25);
  overflow: hidden;
  backdrop-filter: blur(2px);
  padding: 22px 18px 24px;
}

　.shine {
  　position: absolute;
  　inset: 0;
  　background: radial-gradient(circle, rgba(255,244,204,0.95), rgba(255,244,204,0.25) 35%, transparent 70%);
  　opacity: 0;
  　transform: scale(0.5);
  　pointer-events: none;
　}

  .whiteout {
    position: fixed;
    inset: 0;
    background: #fff8df;
    opacity: 0;
    pointer-events: none;
    z-index: 10;
  }

h1 {
  font-size: 2.2rem;
  margin: 18px 0 18px;
}

 .subtitle {
    line-height: 120%;
    font-size: 18px;
    margin-bottom: 20px;
  }

.card-image {
  width: 70%;
  max-width: 360px;
  max-height: 45vh;
  aspect-ratio: 3 / 4;
  object-fit: contain;
  border-radius: 16px;
  display: block;
  margin: 18px auto 18px;
  box-shadow: 0 16px 35px rgba(40, 25, 10, 0.35);
  -webkit-touch-callout: none;
  user-select: none;
  -webkit-user-select: none;
}
    
  .message {
    font-size: 1.1rem;
    line-height: 120%;
    /*white-space: pre-line;*/
  }

  .card-name {
    font-size: 2.2rem;
    margin: 18px 0 8px;
  }

  .keyword {
    font-size: 1.2rem;
    opacity: 0.75;
    margin-bottom: 18px;
  }

  button {
    border: none;
    border-radius: 999px;
    padding: 14px 34px;
    font-size: 16px;
    background: #d8bd7f;
    color: #3a2a17;
    cursor: pointer;
    box-shadow: 0 6px 14px rgba(90, 55, 20, 0.25);
  }

  button:disabled {
    opacity: 0.6;
  }

 .button-area {
   text-align: center;
   margin: 20px auto 32px;
   min-height: 18vh;
   display: flex;
   align-items: center;
   justify-content: center;
}
 
  .button-area button {
   width: 220px;
}
  
  .footer {
    margin-top: 0px;
    font-size: 12px;
    opacity: 0.65;
  }

  .opening .window {
    animation: windowGlow 1.6s ease-in-out;
  }

  .opening .shine {
    animation: shineOpen 1.6s ease-in-out;
  }

  .app.opening ~ .whiteout {
    animation: whiteFlash 1.8s ease-in-out;
  }

  @keyframes windowGlow {
    0% { transform: scale(1); }
    45% { transform: scale(1.02); box-shadow: 0 0 55px rgba(255,210,120,0.9); }
    100% { transform: scale(1); }
  }

  @keyframes shineOpen {
    0% { opacity: 0; transform: scale(0.4); }
    50% { opacity: 1; transform: scale(1.25); }
    100% { opacity: 0; transform: scale(2.2); }
  }

  @keyframes whiteFlash {
    0% { opacity: 0; }
    55% { opacity: 0; }
    75% { opacity: 0.95; }
    100% { opacity: 0; }
  }

 @media (max-width: 500px) {
  .room {
    width: 65%;
    margin: 40px auto 0;
    padding: 0 auto 0px;
  }

  h1 {
    font-size: 38px;
    margin: 5px auto 5px;
  }

  .subtitle {
    font-size: 15px;
    margin-bottom: 5px;
  }
     
  .card-image {
    width: 100%;
    margin: 0px auto 5px;
  }

  .card-name {
    font-size: 28px;
    margin: 0px auto 2px;
  }

  .keyword {
    font-size: 16px;
    margin: 0px auto 2px;
  }

  .message {
    font-size: 16px;
    line-height: 110%;
    white-space: pre-line;
  }
    
  button {
    padding: 12px 30px;
  }
 .button-area {
   margin: 10px auto 5px;
 }
   
}

/*ギャラリーモード*/
.hidden {
  display: none;
}

#galleryMode {
  width: 100%;
  min-height: 100vh;
  padding: 12px;
  box-sizing: border-box;

  display: flex;
  flex-direction: column;
}

#galleryMode.hidden {
  display: none;
}

.gallery-frame {
  flex: 1;
  position: relative;
  width: 100%;

  background-image: url("cards/card01_0.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  border-radius: 24px;
  overflow: hidden;
}

#galleryFlash {
  position: absolute;
  inset: 0;
  background: white;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1.2s ease;
}

#galleryFlash.active {
  opacity: 1;
}

#galleryMode button {
  margin-top: 10px;
  width: 100%;
  padding: 8px 14px 20px;
  border-radius: 999px;
  border: none;
  background: #d9be72;
  color: #4a321f;
  font-size: 16px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

</style>
</head>

<body>
  <main class="app" id="app">
    <section class="room">
      <div class="window">
        <div id="result">
          <h1>客間の窓</h1>
          <p class="subtitle">
            森の小屋の客間には、<br>
            今必要な景色を映す<br>
            窓があります。
          </p>
        <p class="message">
          窓の向こうは、まだ静かです。
        </p>
    </div>

    <div class="shine"></div>
  </div>
</section>

    <div class="button-area">
      <button id="drawButton" onclick="startOracle()">窓を見る</button>
    </div>

    <p class="footer">Petite Oathica<br>客間の窓</p>
  </main>

  <div id="galleryMode" class="hidden">
    <div class="gallery-frame" id="galleryFrame">
      <div id="galleryFlash"></div>
    </div>

    <button onclick="closeGallery()">客間へ戻る</button>
  </div>
      
  <div class="whiteout"></div>
</body>

<script>
const cards = [
  { name: "小屋の灯", keyword: "希望・灯火", message: "大きく変えなくてもいい\n今日灯せる範囲を灯そう", image: "cards/card01.png" },
  { name: "暖炉の火", keyword: "情熱・火種", message: "小さな火種を守る\n勢いより継続", image: "cards/card02.png" },
  { name: "窓辺の作業机", keyword: "制作・実践", message: "考えるより\n少しだけ手を動かす", image: "cards/card03.png" },
  { name: "月の湯", keyword: "調律・休息", message: "答えを探す前に整える", image: "cards/card04.png" },
  { name: "地下室の宝箱", keyword: "保留・熟成", message: "今は開かないものもある", image: "cards/card05.png" },
  { name: "ソラの書斎", keyword: "記録・整理", message: "言葉にすると見えてくる", image: "cards/card06.png" },
  { name: "老師の紙片", keyword: "知恵・余裕", message: "深刻さを\n笑いに変えてみる", image: "cards/card07.png" },
  { name: "真珠色の金魚", keyword: "魂・内なる声", message: "静かな場所に\n答えは泳いでいる", image: "cards/card08.png" },
  { name: "森の白猫", keyword: "気まぐれ・癒し", message: "予定外の\n優しさを受け取る", image: "cards/card09.png" },
  { name: "桃の若木", keyword: "成長・未来", message: "見えなくても育っている", image: "cards/card10.png" },
  { name: "森の茶会", keyword: "余白・一息つく", message: "湯気がほどけるように\n答えもゆっくり現れる", image: "cards/card11.png" },
  { name: "白日花", keyword: "生命力・蓄え", message: "未来のために\n必要な準備がある", image: "cards/card12.png" },
  { name: "灯花", keyword: "勇気・夜の光", message: "闇の中にも灯りはある", image: "cards/card13.png" },
  { name: "雪解", keyword: "再開・流れ", message: "止まっていたものが\n動き出す", image: "cards/card14.png" },
  { name: "名もなき空色", keyword: "自由・伸びやか", message: "名前をつけなくても\nそれは喜び", image: "cards/card15.png" },
  { name: "光のきざはし", keyword: "導き・兆し", message: "光が差した場所に\nまだ知らない道がある", image: "cards/card16.png" },
  { name: "星降りの湖", keyword: "広い視点・神秘", message: "少し高い場所から眺めてみる", image: "cards/card17.png" },
  { name: "眠り龍の谷", keyword: "力・静観", message: "今は起こさなくていい力もある", image: "cards/card18.png" },
  { name: "森のフクロウ", keyword: "観察・洞察", message: "急がず\nまず見る", image: "cards/card19.png" },
  { name: "月夜の誓い", keyword: "自己信頼・約束", message: "自分との約束を思い出す", image: "cards/card20.png" },
  { name: "ローズマリー商会", keyword: "選択・信頼", message: "選ばなかったものが\n良く見えるだけ", image: "cards/card21.png" },
  { name: "行商人の荷車", keyword: "交換・出会い", message: "持っているものと\n受け取るものは同じではない", image: "cards/card22.png" },
  { name: "風の抜け道", keyword: "移動・変化", message: "隠していたものに\n風を通してみる", image: "cards/card23.png" },
  { name: "ひと枝", keyword: "感謝・借りる", message: "力を借りればいい\n対価は喜びと感謝だ", image: "cards/card24.png" }
];

let pressTimer;
let longPressed = false;

function startOracle() {
  const app = document.getElementById("app");
  const button = document.getElementById("drawButton");

  button.disabled = true;
  app.classList.add("opening");

  setTimeout(() => {
    drawCard();
    button.style.display = "none";
  }, 1350);

  setTimeout(() => {
    app.classList.remove("opening");
  }, 1900);
}

function drawCard() {
  const randomIndex = Math.floor(Math.random() * cards.length);
  const card = cards[randomIndex];

  document.getElementById("result").innerHTML = `
    <h2 class="card-name">${card.name}</h2>
    <p class="keyword">${card.keyword}</p>
    <img class="card-image" id="cardImage" src="${card.image}" alt="${card.name}" draggable="false">
    <p class="message">${card.message}</p>
  `;

  const cardImage = document.getElementById("cardImage");

  cardImage.addEventListener("click", () => {
    if (!longPressed) {
      const app = document.getElementById("app");

      app.classList.add("opening");

      setTimeout(() => {
        drawCard();
      }, 1350);

    setTimeout(() => {
      app.classList.remove("opening");
    }, 1900);
  }
});

  cardImage.addEventListener("pointerdown", () => {
    longPressed = false;

    pressTimer = setTimeout(() => {
      longPressed = true;
      openGallery();
    }, 800);
  });

  cardImage.addEventListener("pointerup", () => {
    clearTimeout(pressTimer);
  });

  cardImage.addEventListener("pointerleave", () => {
    clearTimeout(pressTimer);
  });
  
  cardImage.addEventListener("contextmenu", (event) => {
    event.preventDefault();
  });
}

/*ギャラリーモード*/
let galleryTimer = null;
let galleryCurrent = 1;
const galleryTotal = 24;

const galleryMode = document.getElementById("galleryMode");
const galleryFrame = document.getElementById("galleryFrame");
const galleryFlash = document.getElementById("galleryFlash");

function getGalleryImagePath(number) {
  const padded = String(number).padStart(2, "0");
  return `cards/card${padded}_0.png`;
}

function openGallery() {
  const app = document.getElementById("app");

  app.classList.add("hidden");
  galleryMode.classList.remove("hidden");

  galleryCurrent = 1;
  galleryFrame.style.backgroundImage = `url("${getGalleryImagePath(galleryCurrent)}")`;

  if (galleryTimer === null) {
    galleryTimer = setInterval(nextGalleryImage, 5000);
  }
}

function closeGallery() {
  const app = document.getElementById("app");

  galleryMode.classList.add("hidden");
  app.classList.remove("hidden");

  clearInterval(galleryTimer);
  galleryTimer = null;
}

function nextGalleryImage() {
  let next = galleryCurrent + 1;

  if (next > galleryTotal) {
    next = 1;
  }

  const nextPath = getGalleryImagePath(next);

  const preload = new Image();
  preload.src = nextPath;

  preload.onload = () => {
    galleryFlash.classList.add("active");

    setTimeout(() => {
      galleryFrame.style.backgroundImage = `url("${nextPath}")`;
      galleryCurrent = next;

      galleryFlash.classList.remove("active");
    }, 1200);
  };
}

/*setInterval(nextGalleryImage, 5000);*/  
  
</script>
</html>
